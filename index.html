<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <div>
          <h1>Snake</h1>
          <p>Use arrows or WASD. Eat food, avoid walls and yourself.</p>
        </div>
        <div class="score-panel" aria-live="polite">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
      </header>

      <section class="board-wrap" aria-label="Snake game">
        <canvas id="board" width="420" height="420"></canvas>
        <div id="status" class="status" role="status">Press Start or any direction key.</div>
      </section>

      <div class="actions">
        <button id="start" type="button">Start</button>
        <button id="restart" type="button">Restart</button>
      </div>

      <nav class="d-pad" aria-label="Direction controls">
        <button type="button" data-direction="up" aria-label="Move up">↑</button>
        <button type="button" data-direction="left" aria-label="Move left">←</button>
        <button type="button" data-direction="right" aria-label="Move right">→</button>
        <button type="button" data-direction="down" aria-label="Move down">↓</button>
      </nav>
    </main>

    <script type="module" src="./snake.js"></script>
  </body>
</html>
